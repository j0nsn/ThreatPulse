<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ThreatPulse 安全情报聚合平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 登录页背景 */
        .login-bg {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(239, 68, 68, 0.04) 0%, transparent 50%);
            min-height: 100vh;
        }

        /* 浮动粒子 */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle linear infinite;
            opacity: 0.12;
        }
        @keyframes float-particle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.12; }
            90% { opacity: 0.12; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* 卡片光晕边框 */
        .login-card {
            position: relative;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 1.25rem;
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1.25rem;
            padding: 1px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.4), rgba(59, 130, 246, 0.15), rgba(239, 68, 68, 0.1), rgba(6, 182, 212, 0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        /* 输入框聚焦光效 */
        .input-glow:focus-within {
            box-shadow: 0 0 0 1px rgba(6, 182, 212, 0.5), 0 0 20px rgba(6, 182, 212, 0.1);
        }

        /* 登录按钮闪光 */
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
            transform: rotate(30deg);
            animation: shine 3s ease-in-out infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }

        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pwd-toggle { transition: color 0.2s ease; }
        .pwd-toggle:hover { color: #06b6d4 !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .shake { animation: shake 0.5s ease-in-out; }

        /* 网格背景 */
        .grid-bg {
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="login-bg grid-bg relative overflow-hidden">
    <!-- 背景粒子 -->
    <div id="particles" class="fixed inset-0 z-0 overflow-hidden"></div>

    <!-- 登录卡片 -->
    <div class="relative z-10 flex items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-2xl shadow-cyan-500/30 mx-auto mb-4">
                    <i class="ri-shield-flash-line text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">ThreatPulse</h1>
                <p class="text-sm text-gray-500 mt-1.5">安全情报聚合平台 · 身份验证</p>
            </div>

            <!-- 表单卡片 -->
            <div class="login-card p-8">
                <form id="loginForm" autocomplete="off">
                    <!-- 错误提示 -->
                    <div id="errorMsg" class="hidden mb-5 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-2">
                        <i class="ri-error-warning-fill text-base"></i>
                        <span id="errorText"></span>
                    </div>

                    <!-- 用户名 -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-400 mb-2">
                            <i class="ri-user-3-line mr-1"></i> 用户名
                        </label>
                        <div class="relative input-glow rounded-xl transition-all duration-300">
                            <input
                                id="username"
                                type="text"
                                placeholder="请输入用户名"
                                class="w-full bg-gray-800/80 border border-gray-700 rounded-xl px-4 py-3 pl-11 text-sm text-gray-200 placeholder-gray-600 focus:border-cyan-500 focus:outline-none transition-all duration-300"
                                required
                                maxlength="50"
                            >
                            <div class="absolute left-4 top-1/2 -translate-y-1/2">
                                <i class="ri-user-line text-gray-600"></i>
                            </div>
                        </div>
                    </div>

                    <!-- 密码 -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-400 mb-2">
                            <i class="ri-lock-line mr-1"></i> 密码
                        </label>
                        <div class="relative input-glow rounded-xl transition-all duration-300">
                            <input
                                id="password"
                                type="password"
                                placeholder="请输入密码"
                                class="w-full bg-gray-800/80 border border-gray-700 rounded-xl px-4 py-3 pl-11 pr-11 text-sm text-gray-200 placeholder-gray-600 focus:border-cyan-500 focus:outline-none transition-all duration-300"
                                required
                                maxlength="100"
                            >
                            <div class="absolute left-4 top-1/2 -translate-y-1/2">
                                <i class="ri-lock-2-line text-gray-600"></i>
                            </div>
                            <button type="button" id="togglePwd" class="absolute right-4 top-1/2 -translate-y-1/2 pwd-toggle text-gray-600 focus:outline-none" tabindex="-1">
                                <i class="ri-eye-off-line" id="pwdIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 登录按钮 -->
                    <button
                        id="loginBtn"
                        type="submit"
                        class="btn-shine w-full py-3 rounded-xl font-semibold text-sm bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40 transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2"
                    >
                        <i class="ri-login-box-line" id="loginIcon"></i>
                        <span id="loginText">登 录</span>
                    </button>
                </form>

                <!-- 安全提示 -->
                <div class="mt-6 pt-5 border-t border-gray-800">
                    <div class="flex items-start gap-2 text-xs text-gray-600">
                        <i class="ri-shield-check-line text-emerald-600 text-sm mt-0.5 shrink-0"></i>
                        <span>本系统仅限授权人员登录，所有操作均有安全审计。请勿向他人泄露登录凭据。</span>
                    </div>
                </div>
            </div>

            <div class="text-center mt-6 text-xs text-gray-700">
                ThreatPulse © 2026
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
